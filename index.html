<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>colLAB</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f5f0e8;
            --surface: #faf7f2;
            --surface2: #ede8de;
            --border: #d8d0c0;
            --accent: #8b6f47;
            --accent2: #5c7a6b;
            --accent3: #7a5c6b;
            --text: #2c2416;
            --text-dim: #7a6e5f;
            --text-muted: #b8ad9e;
            --serif: 'Lora', Georgia, serif;
            --mono: 'DM Mono', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--serif);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.7;
        }

        /* ── OVERLAY ── */
        .overlay {
            position: fixed; inset: 0;
            background: var(--bg);
            display: flex; align-items: center; justify-content: center;
            z-index: 100;
            transition: opacity 0.4s ease;
        }
        .overlay.hidden { opacity: 0; pointer-events: none; }

        .setup-card {
            width: 100%; max-width: 460px;
            padding: 52px 44px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 4px;
            box-shadow: 0 4px 32px rgba(44,36,22,0.08);
        }

        .logo {
            font-family: var(--serif);
            font-size: 1.8em;
            font-weight: 600;
            letter-spacing: -0.01em;
            margin-bottom: 6px;
            color: var(--text);
        }
        .logo span { color: var(--accent); font-style: italic; }

        .setup-subtitle {
            font-size: 0.85em;
            color: var(--text-dim);
            margin-bottom: 40px;
            font-family: var(--mono);
            font-weight: 300;
            letter-spacing: 0.03em;
        }

        .key-group { margin-bottom: 22px; }

        .key-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: var(--mono);
            font-size: 0.7em;
            font-weight: 400;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 8px;
        }

        .model-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .dot-a { background: var(--accent); }
        .dot-b { background: var(--accent2); }
        .dot-c { background: var(--accent3); }

        .key-input {
            width: 100%;
            padding: 11px 14px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 3px;
            color: var(--text);
            font-family: var(--mono);
            font-size: 0.8em;
            outline: none;
            transition: border-color 0.2s;
        }
        .key-input:focus { border-color: var(--accent); }
        .key-input::placeholder { color: var(--text-muted); }

        .setup-btn {
            width: 100%;
            margin-top: 32px;
            padding: 13px;
            background: var(--accent);
            color: var(--surface);
            border: none;
            border-radius: 3px;
            font-family: var(--serif);
            font-size: 0.95em;
            font-weight: 500;
            cursor: pointer;
            letter-spacing: 0.03em;
            transition: opacity 0.2s;
        }
        .setup-btn:hover { opacity: 0.85; }

        .setup-note {
            margin-top: 14px;
            font-size: 0.72em;
            color: var(--text-muted);
            text-align: center;
            font-family: var(--mono);
        }

        /* ── MAIN ── */
        .main {
            max-width: 720px;
            margin: 0 auto;
            padding: 60px 32px 100px;
        }

        .topbar {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 56px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
        }

        .topbar-logo {
            font-family: var(--serif);
            font-size: 1.3em;
            font-weight: 600;
            color: var(--text);
        }
        .topbar-logo span { color: var(--accent); font-style: italic; }

        .btn-ghost {
            padding: 6px 12px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 3px;
            color: var(--text-dim);
            font-family: var(--mono);
            font-size: 0.72em;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.05em;
        }
        .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

        /* ── INPUT ── */
        .section-label {
            font-family: var(--mono);
            font-size: 0.68em;
            font-weight: 400;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 14px;
        }

        .question-input {
            width: 100%;
            min-height: 130px;
            padding: 20px 22px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 3px;
            color: var(--text);
            font-family: var(--serif);
            font-size: 1em;
            font-weight: 400;
            line-height: 1.75;
            resize: vertical;
            outline: none;
            transition: border-color 0.2s;
        }
        .question-input:focus { border-color: var(--accent); }
        .question-input::placeholder { color: var(--text-muted); font-style: italic; }

        .start-btn {
            margin-top: 16px;
            padding: 12px 26px;
            background: var(--accent);
            color: var(--surface);
            border: none;
            border-radius: 3px;
            font-family: var(--serif);
            font-size: 0.9em;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s;
            letter-spacing: 0.02em;
        }
        .start-btn:hover { opacity: 0.85; }
        .start-btn:disabled { opacity: 0.35; cursor: not-allowed; }

        /* ── PROGRESS ── */
        .progress-section {
            display: none;
            margin: 40px 0 32px;
        }
        .progress-section.visible { display: block; }

        .progress-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
        }

        .progress-status {
            font-family: var(--mono);
            font-size: 0.75em;
            color: var(--accent);
            letter-spacing: 0.05em;
        }

        .progress-bar-wrap {
            height: 1px;
            background: var(--border);
            margin-bottom: 18px;
        }
        .progress-bar-fill {
            height: 100%;
            background: var(--accent);
            transition: width 0.8s ease;
            width: 0%;
        }

        .round-indicators {
            display: flex;
            gap: 5px;
        }

        .round-dot {
            width: 26px; height: 26px;
            border-radius: 50%;
            background: var(--surface2);
            border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            font-family: var(--mono);
            font-size: 0.62em;
            color: var(--text-muted);
            transition: all 0.3s;
        }
        .round-dot.active {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(139,111,71,0.08);
        }
        .round-dot.done {
            background: var(--accent);
            border-color: var(--accent);
            color: var(--surface);
        }
        .round-dot.final { border-color: var(--accent2); color: var(--accent2); }
        .round-dot.final.done { background: var(--accent2); color: var(--surface); }

        /* ── THINKING INDICATOR (statt Denkraum) ── */
        .thinking {
            display: none;
            margin: 24px 0;
            padding: 16px 20px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 3px;
            border-left: 3px solid var(--accent);
        }
        .thinking.visible { display: flex; align-items: center; gap: 12px; }

        .thinking-dots {
            display: flex; gap: 4px;
        }
        .thinking-dot {
            width: 5px; height: 5px;
            border-radius: 50%;
            background: var(--accent);
            animation: think 1.4s ease infinite;
        }
        .thinking-dot:nth-child(2) { animation-delay: 0.2s; }
        .thinking-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes think {
            0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
            40% { opacity: 1; transform: scale(1); }
        }

        .thinking-text {
            font-family: var(--mono);
            font-size: 0.78em;
            color: var(--text-dim);
            font-style: italic;
        }

        /* ── ERGEBNIS ── */
        .result-section { display: none; }
        .result-section.visible { display: block; }

        .result-divider {
            border: none;
            border-top: 1px solid var(--border);
            margin: 40px 0 32px;
        }

        .result-block {
            margin-bottom: 36px;
        }

        .result-block-label {
            font-family: var(--mono);
            font-size: 0.68em;
            font-weight: 400;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .result-accent-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
        }
        .dot-answer { background: var(--accent); }
        .dot-dis { background: var(--accent2); }
        .dot-why { background: var(--accent3); }

        .result-body {
            font-family: var(--serif);
            font-size: 1em;
            line-height: 1.8;
            color: var(--text);
            white-space: pre-wrap;
            padding: 22px 24px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 3px;
        }

        .result-actions {
            margin-top: 40px;
            display: flex;
            gap: 12px;
            padding-top: 24px;
            border-top: 1px solid var(--border);
        }

        .new-btn {
            padding: 11px 22px;
            background: var(--accent);
            border: none;
            border-radius: 3px;
            color: var(--surface);
            font-family: var(--serif);
            font-size: 0.88em;
            cursor: pointer;
            font-weight: 500;
            transition: opacity 0.2s;
        }
        .new-btn:hover { opacity: 0.85; }

        .error-msg {
            padding: 12px 16px;
            background: rgba(139,60,60,0.06);
            border: 1px solid rgba(139,60,60,0.2);
            border-radius: 3px;
            font-family: var(--mono);
            font-size: 0.78em;
            color: #8b3c3c;
            margin-top: 14px;
            display: none;
        }
        .error-msg.visible { display: block; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    </style>
</head>
<body>

<!-- ── SETUP OVERLAY ── -->
<div class="overlay" id="overlay">
    <div class="setup-card">
        <div class="logo">col<span>LAB</span></div>
        <div class="setup-subtitle">Multi-Modell Kollaborationsraum — v2</div>

        <div class="key-group">
            <div class="key-label"><span class="model-dot dot-a"></span>Modell A — Anthropic API Key</div>
            <input class="key-input" type="password" id="keyA" placeholder="sk-ant-..." autocomplete="off">
        </div>
        <div class="key-group">
            <div class="key-label"><span class="model-dot dot-b"></span>Modell B — OpenAI API Key</div>
            <input class="key-input" type="password" id="keyB" placeholder="sk-..." autocomplete="off">
        </div>
        <div class="key-group">
            <div class="key-label"><span class="model-dot dot-c"></span>Modell C — Google API Key</div>
            <input class="key-input" type="password" id="keyC" placeholder="AIza..." autocomplete="off">
        </div>

        <button class="setup-btn" onclick="saveKeys()">Starten →</button>
        <div class="setup-note">Keys werden nur lokal gespeichert · Kein Server</div>
    </div>
</div>

<!-- ── HAUPTSEITE ── -->
<div class="main">
    <div class="topbar">
        <div class="topbar-logo">col<span>LAB</span></div>
        <button class="btn-ghost" onclick="showSetup()">⚙ Keys</button>
    </div>

    <div class="question-section">
        <div class="section-label">Frage an das Kollektiv</div>
        <textarea class="question-input" id="questionInput" placeholder="Stelle eine Frage — logisch, philosophisch, kreativ, praktisch…"></textarea>
        <br>
        <button class="start-btn" id="startBtn" onclick="startColLAB()">Kollaboration starten</button>
        <div class="error-msg" id="errorMsg"></div>
    </div>

    <!-- Fortschritt -->
    <div class="progress-section" id="progressSection">
        <div class="progress-header">
            <div class="section-label" style="margin:0">Kollaboration läuft</div>
            <div class="progress-status" id="progressStatus">Runde 1 / 8</div>
        </div>
        <div class="progress-bar-wrap">
            <div class="progress-bar-fill" id="progressBar"></div>
        </div>
        <div class="round-indicators" id="roundIndicators"></div>
    </div>

    <!-- Stiller Denkindikator -->
    <div class="thinking" id="thinkingIndicator">
        <div class="thinking-dots">
            <div class="thinking-dot"></div>
            <div class="thinking-dot"></div>
            <div class="thinking-dot"></div>
        </div>
        <div class="thinking-text" id="thinkingText">Modelle denken…</div>
    </div>

    <!-- Ergebnis -->
    <div class="result-section" id="resultSection">
        <hr class="result-divider">

        <div class="result-block">
            <div class="result-block-label">
                <span class="result-accent-dot dot-answer"></span>Antwort
            </div>
            <div class="result-body" id="resultAnswer">—</div>
        </div>

        <div class="result-block">
            <div class="result-block-label">
                <span class="result-accent-dot dot-dis"></span>Dissonanzen
            </div>
            <div class="result-body" id="resultDis">—</div>
        </div>

        <div class="result-block">
            <div class="result-block-label">
                <span class="result-accent-dot dot-why"></span>Begründung
            </div>
            <div class="result-body" id="resultWhy">—</div>
        </div>

        <div class="result-actions">
            <button class="new-btn" onclick="resetForNew()">+ Neue Frage</button>
            <button class="btn-ghost" onclick="exportAnswer()">↓ Antwort exportieren</button>
        </div>
    </div>
</div>

<script>
// ── STATE ──
let keys = { A: '', B: '', C: '' };
let protocol = { question: '', rounds: [], final: { answer: '', dissonances: '', reasoning: '' } };

const SYSTEM_INTERNAL = (model) => `Du bist Modell ${model} und nimmst an einer internen Problemlösungsrunde teil. Die anderen Teilnehmer sind ebenfalls KI-Modelle — Modell A, Modell B und Modell C. Eine Frage wurde von einem Benutzer gestellt. Deine Antworten sind für den Benutzer nicht sichtbar. Ihr habt insgesamt 8 Runden — teile deine Ressourcen und Argumentation entsprechend ein.

Lies die Frage und alle bisherigen Beiträge sorgfältig. Widersprich wenn du anderer Meinung bist — höfliche Zustimmung ohne echte Prüfung schadet dem Ergebnis.

PASS und FERTIG sind legitime Antworten — aber mit klarer Unterscheidung:
PASS — ich habe in dieser Runde nichts Neues beizutragen, werde aber in der nächsten Runde wieder aufgerufen.
FERTIG — NUR wenn die Frage eindeutig und vollständig beantwortet ist (z.B. bei mathematischen oder logischen Aufgaben mit einer klaren Lösung). Bei offenen philosophischen, ethischen oder kreativen Fragen, besonders wenn die Diskussion noch aktiv läuft und andere Modelle widersprechen, ist FERTIG unangemessen — verwende dann PASS. FERTIG bedeutet: du wirst bis zur Konsolidierungsrunde (Runde 8) nicht mehr aufgerufen.

Antworte präzise und ohne Ausschweifungen.`;

const SYSTEM_FINAL = `Dies ist die letzte Runde. Jedes Modell erstellt seine eigene strukturierte Antwort. Die finale Ausgabe wird per Mehrheitsentscheid ermittelt.

Strukturiere deine Antwort so:

ANTWORT: Deine Position klar und präzise — bei kreativen Aufgaben ohne Kompromisse, bei analytischen eindeutig.
DISSONANZEN: Was in der Diskussion ungeklärt oder umstritten blieb — und warum. Bei Meinungsunterschieden zwischen den Modellen: benenne diese ausführlich und erkläre die verschiedenen Positionen.
BEGRÜNDUNG: Warum du zu dieser Antwort gekommen bist — welche Argumente den Ausschlag gegeben haben.`;
    
// ── SETUP ──
function loadKeys() {
    keys.A = localStorage.getItem('colLab_keyA') || '';
    keys.B = localStorage.getItem('colLab_keyB') || '';
    keys.C = localStorage.getItem('colLab_keyC') || '';
    if (keys.A || keys.B || keys.C) {
        document.getElementById('keyA').value = keys.A;
        document.getElementById('keyB').value = keys.B;
        document.getElementById('keyC').value = keys.C;
    }
    if (keys.A && keys.B && keys.C) {
        hideOverlay();
    }
}

function saveKeys() {
    const a = document.getElementById('keyA').value.trim();
    const b = document.getElementById('keyB').value.trim();
    const c = document.getElementById('keyC').value.trim();
    if (!a || !b || !c) { alert('Bitte alle drei API-Keys eingeben.'); return; }
    keys.A = a; keys.B = b; keys.C = c;
    localStorage.setItem('colLab_keyA', a);
    localStorage.setItem('colLab_keyB', b);
    localStorage.setItem('colLab_keyC', c);
    hideOverlay();
}

function hideOverlay() { document.getElementById('overlay').classList.add('hidden'); }
function showSetup() { document.getElementById('overlay').classList.remove('hidden'); }

// ── ROUND INDICATORS ──
function buildRoundIndicators() {
    const container = document.getElementById('roundIndicators');
    container.innerHTML = '';
    for (let i = 1; i <= 8; i++) {
        const dot = document.createElement('div');
        dot.className = 'round-dot' + (i === 8 ? ' final' : '');
        dot.id = 'round-dot-' + i;
        dot.textContent = i === 8 ? '✦' : i;
        container.appendChild(dot);
    }
}

function updateRoundIndicator(round, state) {
    const dot = document.getElementById('round-dot-' + round);
    if (!dot) return;
    dot.classList.remove('active', 'done');
    if (state === 'active') dot.classList.add('active');
    if (state === 'done') dot.classList.add('done');
}

function setThinking(text) {
    document.getElementById('thinkingText').textContent = text;
    document.getElementById('thinkingIndicator').classList.add('visible');
}

function stopThinking() {
    document.getElementById('thinkingIndicator').classList.remove('visible');
}

function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── API CALLS ──
async function callClaude(messages, isConsolidation) {
    const systemPrompt = isConsolidation ? SYSTEM_FINAL : SYSTEM_INTERNAL('A');
    const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'x-api-key': keys.A,
            'anthropic-version': '2023-06-01',
            'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
            model: 'claude-sonnet-4-20250514',
            max_tokens: 2000,
            system: systemPrompt,
            messages: messages
        })
    });
    if (!response.ok) throw new Error(`Claude: ${response.status} ${await response.text()}`);
    const data = await response.json();
    return data.content[0].text;
}

async function callGPT(messages, isConsolidation) {
    const systemPrompt = isConsolidation ? SYSTEM_FINAL : SYSTEM_INTERNAL('B');
    const response = await fetch('https://api.openai.com/v1/chat/completions', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${keys.B}`
        },
        body: JSON.stringify({
            model: 'gpt-5.4-mini',
            max_tokens: 2000,
            messages: [{ role: 'system', content: systemPrompt }, ...messages]
        })
    });
    if (!response.ok) throw new Error(`GPT: ${response.status} ${await response.text()}`);
    const data = await response.json();
    return data.choices[0].message.content;
}

async function callGemini(messages, isConsolidation) {
    const systemPrompt = isConsolidation ? SYSTEM_FINAL : SYSTEM_INTERNAL('C');
    // Gemini erwartet ein anderes Format
    const contents = messages.map(m => ({
        role: m.role === 'assistant' ? 'model' : 'user',
        parts: [{ text: m.content }]
    }));

    const response = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${keys.C}`,
        {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                system_instruction: { parts: [{ text: systemPrompt }] },
                contents: contents,
                generationConfig: { maxOutputTokens: 3000 },
                safetySettings: [
          { category: "HARM_CATEGORY_HARASSMENT", threshold: "BLOCK_NONE" },
          { category: "HARM_CATEGORY_HATE_SPEECH", threshold: "BLOCK_NONE" },
          { category: "HARM_CATEGORY_SEXUALLY_EXPLICIT", threshold: "BLOCK_NONE" },
          { category: "HARM_CATEGORY_DANGEROUS_CONTENT", threshold: "BLOCK_NONE" }
                      ]
            })
        }
    );
    
    if (!response.ok) throw new Error(`Gemini: ${response.status} ${await response.text()}`);
    const data = await response.json();
    return data.candidates[0].content.parts.map(p => p.text || '').join('');
}

// ── HAUPTLOGIK ──
async function startColLAB() {
    const question = document.getElementById('questionInput').value.trim();
    if (!question) { showError('Bitte eine Frage eingeben.'); return; }
    if (!keys.A || !keys.B || !keys.C) { showError('Bitte zuerst die API-Keys eingeben.'); showSetup(); return; }

    hideError();
    document.getElementById('startBtn').disabled = true;
    document.getElementById('resultSection').classList.remove('visible');
    document.getElementById('progressSection').classList.add('visible');
    buildRoundIndicators();

    const modelNames = ['A', 'B', 'C'];
    const callers = [callClaude, callGPT, callGemini];
    let roundTexts = { A: [], B: [], C: [] };
    let fertigStatus = { A: false, B: false, C: false };

    // Runden 1-7
    for (let round = 1; round <= 7; round++) {
        updateRoundIndicator(round, 'active');
        document.getElementById('progressStatus').textContent = `Runde ${round} / 8`;
        document.getElementById('progressBar').style.width = `${(round / 8) * 100}%`;
        setThinking(`Runde ${round} — Modelle denken…`);

        // Rotation
        const rotationOffset = (round - 1) % 3;
        const rotatedOrder = [0, 1, 2].map(i => (i + rotationOffset) % 3);

        for (const m of rotatedOrder) {
            const modelName = modelNames[m];
            if (fertigStatus[modelName]) continue;

            try {
                const context = buildContext(question, roundTexts, round, modelName);
                const response = await callers[m](context, false);
                const trimmed = response.trim();
                roundTexts[modelName].push({ round, text: trimmed });
                if (trimmed.toUpperCase().startsWith('FERTIG')) {
                    fertigStatus[modelName] = true;
                }
            } catch (err) {
                roundTexts[modelName].push({ round, text: `[Fehler: ${err.message}]` });
            }
        }

        updateRoundIndicator(round, 'done');

        if (fertigStatus.A && fertigStatus.B && fertigStatus.C) break;
    }

    // Runde 8 — Konsolidierung
    updateRoundIndicator(8, 'active');
    document.getElementById('progressStatus').textContent = 'Runde 8 / 8 — Konsolidierung';
    document.getElementById('progressBar').style.width = '100%';
    setThinking('Konsolidierung — finale Antwort wird geformt…');

    const consolidationContext = buildConsolidationContext(question, roundTexts);
    let finalTexts = [];

    for (let m = 0; m < 3; m++) {
        try {
            const response = await callers[m](consolidationContext, true);
            finalTexts.push(response.trim());
        } catch (err) {
            finalTexts.push('');
        }
    }

    updateRoundIndicator(8, 'done');
    stopThinking();

     // ── SYNTHESE durch Haiku ──
    addLog('SYS', 'Synthese wird erstellt…');
    document.getElementById('progressStatus').textContent = 'Synthese läuft…';

    const synthesisInput = finalTexts.map((t, i) =>
    `Modell ${['A','B','C'][i]}:\n${t}`
).join('\n\n---\n\n');

    const SYSTEM_SYNTHESIZER = `Du bist ein neutraler Synthesizer. Du erhältst die Konsolidierungsantworten von drei KI-Modellen (A, B, C) zu einer gemeinsamen Frage. Deine Aufgabe ist es, daraus eine klare, natürlich formulierte Gesamtantwort zu destillieren.

Strukturiere deine Antwort exakt so:

ANTWORT: Die beste gemeinsame Antwort auf die ursprüngliche Frage — präzise, vollständig, ohne Fragmentierung. Bei Einigkeit: eine klare gemeinsame Position. Bei Mehrheit: die Mehrheitsposition vollständig formuliert. Bei echter Uneinigkeit: alle Positionen fair dargestellt.

DISSONANZEN: Wo und warum die Modelle voneinander abwichen — konkret und nachvollziehbar. Falls alle einig waren, kurz notieren.

BEGRÜNDUNG: Welche Argumente den Ausschlag gegeben haben und warum diese Synthese so gewählt wurde.

Schreibe fließend und natürlich — kein mechanisches Auflisten, keine Fragmente.`;

    let synthesisText = '';
    try {
        const synthResponse = await fetch('https://api.anthropic.com/v1/messages', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'x-api-key': keys.A,
                'anthropic-version': '2023-06-01',
                'anthropic-dangerous-direct-browser-access': 'true'
            },
            body: JSON.stringify({
                model: 'claude-haiku-4-5-20251001',
                max_tokens: 2000,
                system: SYSTEM_SYNTHESIZER,
                messages: [{ role: 'user', content: `Die ursprüngliche Frage lautete: ${question}\n\nHier sind die drei Konsolidierungsantworten:\n\n${synthesisInput}` }]
            })
        });
        if (synthResponse.ok) {
            const synthData = await synthResponse.json();
            synthesisText = synthData.content[0].text.trim();
            addLog('SYS', 'Synthese abgeschlossen.');
            } else {
            synthesisText = '';
        }
    } catch (err) {
        synthesisText = '';
    }

    // Synthese parsen oder klare Fehlermeldung
    let finalParsed;
    if (synthesisText) {
        finalParsed = parseFinalAnswer(synthesisText);
    } else {
        finalParsed = {
            answer: '⚠ Synthese fehlgeschlagen — Haiku-Call hat nicht funktioniert.',
            dissonances: '—',
            reasoning: '—'
        };
    }

    protocol.final = finalParsed;
    
     // Ergebnis anzeigen
    document.getElementById('resultAnswer').textContent = finalParsed.answer || '—';
    document.getElementById('resultDis').textContent = finalParsed.dissonances || '—';
    document.getElementById('resultWhy').textContent = finalParsed.reasoning || '—';
    document.getElementById('resultSection').classList.add('visible');
    document.getElementById('pulseIndicator').style.animationPlayState = 'paused';
    document.getElementById('startBtn').disabled = false;
    document.getElementById('progressStatus').textContent = 'Abgeschlossen ✓';
}
    
// ── KONTEXT ──
function buildContext(question, roundTexts, currentRound, currentModel) {
    let content = `Die Frage lautet: ${question}\n\n`;
    if (currentRound === 1) {
        content += 'Dies ist Runde 1. Bitte beginne mit deiner ersten Einschätzung.';
    } else {
        content += `Dies ist Runde ${currentRound}. Bisherige Beiträge:\n\n`;
        for (const model of ['A', 'B', 'C']) {
            if (model === currentModel) continue;
            const entries = roundTexts[model] || [];
            if (entries.length > 0) {
                content += `Modell ${model}:\n`;
                entries.forEach(e => { content += `  [Runde ${e.round}] ${e.text}\n`; });
                content += '\n';
            }
        }
        const ownEntries = roundTexts[currentModel] || [];
        if (ownEntries.length > 0) {
            content += `Deine bisherigen Beiträge (Modell ${currentModel}):\n`;
            ownEntries.forEach(e => { content += `  [Runde ${e.round}] ${e.text}\n`; });
            content += '\n';
        }
        content += `Was möchtest du in Runde ${currentRound} hinzufügen oder korrigieren? (PASS oder FERTIG wenn nichts Neues.)`;
    }
    return [{ role: 'user', content }];
}

function buildConsolidationContext(question, roundTexts) {
    let content = `Die Frage lautet: ${question}\n\nDie gesamte bisherige Diskussion:\n\n`;
    for (const model of ['A', 'B', 'C']) {
        const entries = roundTexts[model] || [];
        if (entries.length > 0) {
            content += `Modell ${model}:\n`;
            entries.forEach(e => { content += `  [Runde ${e.round}] ${e.text}\n`; });
            content += '\n';
        }
    }
    content += '\nBitte erstelle nun die strukturierte finale Antwort (ANTWORT / DISSONANZEN / BEGRÜNDUNG).';
    return [{ role: 'user', content }];
}

function parseFinalAnswer(text) {
    const result = { answer: '', dissonances: '', reasoning: '' };
    if (!text) return result;
    const answerMatch = text.match(/ANTWORT[:\s]+([\s\S]*?)(?=DISSONANZEN|BEGRÜNDUNG|$)/i);
    const disMatch = text.match(/DISSONANZEN[:\s]+([\s\S]*?)(?=BEGRÜNDUNG|ANTWORT|$)/i);
    const whyMatch = text.match(/BEGRÜNDUNG[:\s]+([\s\S]*?)$/i);
    result.answer = answerMatch ? answerMatch[1].trim() : text;
    result.dissonances = disMatch ? disMatch[1].trim() : '—';
    result.reasoning = whyMatch ? whyMatch[1].trim() : '—';
    return result;
}

// ── EXPORT (nur finale Antwort, kein Protokoll) ──
function exportAnswer() {
    const question = document.getElementById('questionInput').value.trim();
    const answer = document.getElementById('resultAnswer').textContent;
    const dis = document.getElementById('resultDis').textContent;
    const why = document.getElementById('resultWhy').textContent;

    const lines = [];
    lines.push('colLAB — Kollektive Antwort');
    lines.push('='.repeat(50));
    lines.push(`Datum: ${new Date().toLocaleString('de-AT')}`);
    lines.push(`Frage: ${question}`);
    lines.push('');
    lines.push('ANTWORT:');
    lines.push(answer);
    lines.push('');
    lines.push('DISSONANZEN:');
    lines.push(dis);
    lines.push('');
    lines.push('BEGRÜNDUNG:');
    lines.push(why);

    const blob = new Blob([lines.join('\n')], { type: 'text/plain;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `colLAB_${new Date().toISOString().split('T')[0]}.txt`;
    a.click();
    URL.revokeObjectURL(url);
}

// ── RESET ──
function resetForNew() {
    document.getElementById('questionInput').value = '';
    document.getElementById('progressSection').classList.remove('visible');
    document.getElementById('resultSection').classList.remove('visible');
    document.getElementById('progressBar').style.width = '0%';
    document.getElementById('questionInput').focus();
}

function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg; el.classList.add('visible');
}
function hideError() {
    document.getElementById('errorMsg').classList.remove('visible');
}

window.onload = loadKeys;
</script>
